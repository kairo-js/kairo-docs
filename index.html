<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>kairo-docs</title>
    <meta name="description" content="kairo-docs: GitHub Pages で公開する静的ドキュメント" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main>
      <h1>kairo-docs</h1>
      <p>GitHub Pages 用の静的ドキュメントサイトです。</p>
      <section>
        <h2>公開方法</h2>
        <ol>
          <li>GitHub の <strong>Settings &gt; Pages</strong> を開く</li>
          <li><strong>Build and deployment</strong> の Source を <strong>Deploy from a branch</strong> に設定する</li>
          <li>対象ブランチ（例: <code>main</code>）とルート（<code>/ (root)</code>）を選択する</li>
        </ol>
      </section>
    </main>
  </body>
</html>
